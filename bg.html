<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tone Effect</title>

<style>
:root {
  --text: #ffffff;
  --gradient: linear-gradient(135deg, #ff00cc, #3333ff);
  --glass: rgba(20,20,20,0.6);
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* BODY BACKGROUND */
body {
  min-height: 100vh;
  background: radial-gradient(circle at center, #1a0b1a 0%, #050505 70%);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ---------------- HEADER ---------------- */
header {
  position: sticky;
  top: 0;
  padding: 20px 8%;
  background: var(--glass);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  z-index: 100;
}

.logo {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-decoration: none;
  color: #666;
  transition: all 0.4s ease;
}

/* Neon hover animation */
.logo:hover {
  background: var(--gradient);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: neonPulse 1.5s infinite;
  transform: scale(1.05);
}

/* ---------------- FOOTER ---------------- */
footer {
  margin-top: auto;
  padding: 40px 8%;
  text-align: center;
  border-top: 1px solid #222;
  background: #080808;
  color: #666;
  font-size: 0.9rem;
}

/* ---------------- ANIMATIONS ---------------- */
@keyframes neonPulse {
  0% {
    text-shadow: 0 0 5px rgba(255,0,204,0.2);
  }
  50% {
    text-shadow:
      0 0 20px rgba(51,51,255,0.6),
      0 0 10px rgba(255,0,204,0.4);
  }
  100% {
    text-shadow: 0 0 5px rgba(255,0,204,0.2);
  }
}
</style>
</head>

<body>

<header>
  <a href="#" class="logo">Tone Effect</a>
</header>

<footer>
  © 2026 Tone Effect Designing World
</footer>

</body>
</html>
