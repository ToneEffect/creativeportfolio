<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My World</title>
    <style>
        /* --- CSS STYLING --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
            background-color: #000;
        }

        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            object-fit: cover; 
        }

        /* Dark Overlay to make text readable */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* 50% darkness */
            z-index: -1; /* Puts overlay between video and text */
        }

        .container {
            text-align: center;
            position: relative; /* Ensures text sits on top */
            z-index: 1;
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
        }

        p {
            font-size: 1.4rem;
            color: #e2e8f0;
            margin-bottom: 40px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
        }

                .enter-btn {
            text-decoration: none;
            color: #0f172a;
            background-color: #bb38f8; 
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(242, 56, 248, 0.5);
        }

        .enter-btn:hover {
            background-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.7);
            transform: translateY(-3px);
        }


        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="Portfolio Background Animation.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <div class="overlay"></div>

    <div class="container">
        <h1>TONE EFFECT</h1>
        <h4>Designs that tell your brand’s story.</h4>
        <br>
        <p style="font-family:'Serif'">Web Developer | Designer | Creative</p>
        <a href="home.html" class="enter-btn">Enter Our World</a>
    </div>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="cofig.js"></script>

<script>
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
    console.log("Firebase connected successfully!");
  }
</script>
</body>
</html>
